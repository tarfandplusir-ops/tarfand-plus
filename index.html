<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>در حال بروزرسانی</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Vazirmatn', sans-serif;
            background-color: #f8f9fa;
            color: #333333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 380px; /* عرض کادر باز هم کوچک‌تر شد */
            width: 85%; /* مناسب برای نمایش هماهنگ در انواع موبایل */
            padding: 25px 15px; /* کاهش بیشتر فاصله‌های داخلی */
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border-top: 4px solid #007bff; /* ضخامت خط آبی بالای کادر هم کمی ظریف‌تر شد */
        }

        h1 {
            font-size: 1.6rem; /* سایز عنوان کوچک‌تر و ظریف‌تر */
            margin-bottom: 12px;
            color: #2c3e50;
            font-weight: 700;
        }

        p {
            font-size: 0.95rem; /* سایز متن توضیحات بهینه‌تر و فشرده‌تر */
            color: #7f8c8d;
            line-height: 1.7;
            margin-bottom: 0;
        }

        .icon {
            font-size: 2.8rem; /* کوچک‌تر شدن ابعاد ایموجی چرخ‌دنده */
            margin-bottom: 12px;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">⚙️</div>
        <h1>در حال بروزرسانی هستیم</h1>
        <p>کاربر گرامی، سایت در حال حاضر در دست تعمیر و ارتقاء است. تلاش می‌کنیم به زودی و با امکانات بهتر در خدمت شما باشیم. از شکیبایی شما سپاسگزاریم.</p>
    </div>

</body>
</html>
